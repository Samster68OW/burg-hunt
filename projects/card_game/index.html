<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">

    <link rel="icon" type="image/x-icon" href="images/site/favicon.ico">

        <table id="main-menu-table"><tr>

    <script type="text/javascript">



$(document).ready(function(){
  loadCardCollection();
  loadPage('main-menu');
  loadMainMenuPage('home-page');
});
function loadPage(pageName) {
  $('.main-page').fadeOut(0);
  $(`#${pageName}`).fadeIn(0);
};



    </script>
