<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Card Game</title>
    <link rel="icon" type="image/x-icon" href="images/site/favicon.ico">

    <!-- External Sources -->
      <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@200..700&display=swap" rel="stylesheet">
    <!-- Internal Javascript -->
      <!-- Scripts -->
        <script type="text/javascript" src="scripts/game-code.js"></script>
        <script type="text/javascript" src="scripts/main-menu-nav.js"></script>
        <script type="text/javascript" src="scripts/player-loader.js"></script>
        <script type="text/javascript" src="scripts/start-battle.js"></script>
      <!-- Data -->
        <script type="text/javascript" src="data/campaign-data.js"></script>
        <script type="text/javascript" src="data/card-data.js"></script>
        <script type="text/javascript" src="data/set-data.js"></script>
        <script type="text/javascript" src="data/splash-text.js"></script>
        <script type="text/javascript" src="data/store-control.js"></script>
        <script type="text/javascript" src="data/store-data.js"></script>
    <!-- Internal CSS -->
        <link rel="stylesheet" href="stylesheets/main.css">

  </head>
  <body>
    <div id="game-frame">



      <div id="main-menu" class="main-page" hidden>

        <table id="main-menu-table"><tr>
          <td id="home-page-butt" onclick="loadMainMenuPage('home-page');">Home</td>
          <td id="deck-page-butt" onclick="loadMainMenuPage('deck-page');">Decks</td>
          <td id="collection-page-butt" onclick="loadMainMenuPage('collection-page');">Collection</td>
          <td id="store-page-butt" onclick="loadMainMenuPage('store-page');">Store</td>
          <td id="options-page-butt" onclick="loadMainMenuPage('options-page');">Options</td>
          <td id="profile-page-butt" onclick="loadMainMenuPage('profile-page');">Profile</td>
        </tr></table>

        <div id="home-page" class="main-menu-page" hidden>
          <br><br>
          <h1 style="font-size:50px; text-align:center;">Untitled Game</h1>
          <!--TODO: Show stats and ongoing events, perhaps a cool title animation, annoucement, player card-->
          <div onclick="loadPage('campaign-page')">Campaign</div>
          <div id="splash-text-spot"></div>
          <!--Tutorial and random battle-->
        </div>
        <div id="deck-page" class="main-menu-page" hidden>
          <!--TODO: Customize Deck, three presets-->
        </div>
        <div id="collection-page" class="main-menu-page" hidden>
          <h1 style="text-align:center;">Card Collection</h1>
          <table><tr>
            <td id="card-collection-spot"></td>
            <td id="big-card-spot"></td>
          </tr></table>
        </div>
        <div id="store-page" class="main-menu-page" hidden>
          <!--TODO: Purchase booster packs and redeem gifts-->
          <h1>Store</h1>
          <div id="store-section"></div>
        </div>
        <div id="settings-page" class="main-menu-page" hidden>
          <!--TODO: Changelog-->
        </div>
        <div id="profile-page" class="main-menu-page" hidden>
          <!--TODO: Profile card, achievements, and playercard (and customization)-->
        </div>

        <div id="item-open-page" class="main-menu-page" hidden>
          <!--TODO: Show cards you earned!-->
        </div>

      </div>



      <div id="battle-page" class="main-page" hidden>
        <table id="main-battle-table">
          <tr>
            <td id="player-health-spot"></td>
            <td id="timer-spot"></td>
            <td id="opponent-health-spot"></td>
          </tr>
          <tr>
            <td id="main-sprite-spot" colspan="3">
              <div id="player-played-card">
                <div id="player-played-card-spot" style="position:relative; scale:0.4; left:-25px;"></div>
              </div>
              <div id="opponent-played-card">
                <div id="opponent-played-card-spot" style="position:relative; scale:0.4; left:-25px;"></div>
              </div>
            </td>
          </tr>
          <tr>
            <td id="player-cards-spot" colspan="2"></td>
            <td id="card-statistics-spot"></td>
          </tr>
        </table>
      </div>



      <div id="campaign-page" class="main-page">

      </div>



    </div>
    <script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous"></script>
    <script type="text/javascript">



$(document).ready(function(){
  loadCardCollection();
  setupStore();
  loadPage('main-menu');
  loadMainMenuPage('home-page');
  $('#splash-text-spot').html(splashScreenData[Math.floor(Math.random()*splashScreenData.length)]);
});
function loadPage(pageName) {
  $('.main-page').fadeOut(0);
  $(`#${pageName}`).fadeIn(0);
  if (pageName === 'campaign-page') {generateCampaignPage();}
};



    </script>
  </body>
</html>
